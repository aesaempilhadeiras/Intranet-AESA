<!DOCTYPE html>
<html lang="pt-BR" data-tema="escuro">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AESA — Mural de Comunicados</title>
  <link rel="icon" type="image/png" href="img/favicon1.png?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --font: 'DM Sans', sans-serif;
      --orange: #E73B1B;
      --navy: #061851;
      --radius: 16px;
      --duration: 8000;
      /* ms por slide — controlado via JS */
    }

    /* ── TEMAS ── */
    [data-tema="escuro"] {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1f2937;
      --border: #2d3347;
      --text: #e2e8f0;
      --text-muted: #8b93a7;
      --card: #1a1e2e;
      --topbar: #0d1117;
    }

    [data-tema="claro"] {
      --bg: #f0f2f5;
      --bg2: #ffffff;
      --bg3: #e5e8ef;
      --border: #e2e6ea;
      --text: #0f1923;
      --text-muted: #6b7280;
      --card: #ffffff;
      --topbar: #061851;
    }

    html,
    body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      /*cursor: none; /* kiosk */
      user-select: none;
      margin: 0;
      padding: 0;
    }

    /* ── LAYOUT ── */
    .tv-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* ── TOPBAR ── */
    .tv-topbar {
      background: var(--topbar);
      padding: 0 48px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 3px solid var(--orange);
      position: relative;
      z-index: 10;
    }

    [data-tema="claro"] .tv-topbar {
      box-shadow: 0 2px 16px rgba(6, 24, 81, .15);
    }

    .tv-logo {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .tv-logo-mark {
      width: 48px;
      height: 48px;
      background: var(--orange);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      color: #fff;
      letter-spacing: .5px;
      box-shadow: 0 4px 16px rgba(231, 59, 27, .5);
      flex-shrink: 0;
    }

    .tv-logo-text {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .tv-logo-text span {
      display: block;
      color: rgba(255, 255, 255, .45);
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .tv-topbar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255, 255, 255, .9);
      font-size: 15px;
      font-weight: 600;
      letter-spacing: .5px;
    }

    .tv-topbar-center i {
      opacity: .6;
    }

    .tv-clock {
      text-align: right;
    }

    .tv-clock-time {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      letter-spacing: -1px;
    }

    .tv-clock-date {
      font-size: 13px;
      color: rgba(255, 255, 255, .5);
      margin-top: 2px;
      text-transform: capitalize;
    }

    /* ── STAGE (área principal) ── */
    .tv-stage {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }


    .tv-stage>button {
      z-index: 20;
    }

    .tv-stage button:hover {
      background: rgba(0, 0, 0, .6) !important;
      cursor: pointer;
    }


    .tv-slide-media::before {
      pointer-events: none;
    }

    /* ── SLIDES ── */
    .tv-slides {
      display: flex;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      transition: transform .7s cubic-bezier(.4, 0, .2, 1);
      pointer-events: none;
    }

    .tv-slide {
      pointer-events: auto;
      min-width: 100%;
      width: 100%;
      height: 100%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 52px 80px 40px;
      position: relative;
      overflow: hidden;
    }

    /* Slide com mídia (imagem/vídeo) — layout 60/40 */
    .tv-slide.has-media {
      flex-direction: row;
      align-items: stretch;
      gap: 0;
      padding: 0;
    }

    .tv-slide.so-midia {
      padding: 0;
      background: #000;
      display: block;
      position: relative;
    }

    .tv-slide.so-midia .tv-slide-media {
      position: absolute;
      inset: 0;
    }

    .tv-slide.so-midia .tv-slide-media img {
      object-fit: fill;
      width: 100%;
      height: 100%;
      display: block;
    }

    .tv-slide.so-midia .tv-slide-media::before {
      display: none;
    }

    .tv-slide-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
      padding: 52px 64px 40px;
      overflow: hidden;
      min-height: 0;
      max-height: 100%;
    }

    /* PARA: */
    .tv-slide.has-media .tv-slide-content {
      flex: 0 0 45%;
      padding: 52px 56px 40px 80px;
    }

    /* PARA: */
    .tv-slide-media {
      flex: 0 0 75%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      align-self: stretch;
    }

    .tv-slide-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
    }

    .tv-slide-media video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tv-slide-media::before {
      content: '';
      position: absolute;
      inset: 0;
      left: -1px;
      background: linear-gradient(to right, var(--bg) 0%, transparent 30%);
      z-index: 1;
      pointer-events: none;
    }

    /* Decoração de fundo do slide */
    .tv-slide::before {
      display: none;
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: var(--orange);
      opacity: .04;
      pointer-events: none;
    }

    .tv-slide::after {
      content: '';
      position: absolute;
      bottom: -120px;
      left: -60px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: #1e40af;
      opacity: .05;
      pointer-events: none;
    }

    /* Borda esquerda destaque */
    .tv-slide.destaque .tv-slide-content {
      padding-left: 80px;
    }

    .tv-slide.destaque:not(.has-media) {
      border-left: 6px solid var(--orange);
      padding-left: calc(80px - 6px);
    }

    /* Tags */
    .tv-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
      align-self: flex-start;
    }

    .tv-tag.novo {
      background: rgba(231, 59, 27, .15);
      color: #f87171;
      border: 1px solid rgba(231, 59, 27, .3);
    }

    .tv-tag.info {
      background: rgba(30, 64, 175, .15);
      color: #93c5fd;
      border: 1px solid rgba(30, 64, 175, .3);
    }

    .tv-tag.aviso {
      background: rgba(180, 83, 9, .15);
      color: #fbbf24;
      border: 1px solid rgba(180, 83, 9, .3);
    }

    [data-tema="claro"] .tv-tag.novo {
      background: #fff0ec;
      color: var(--orange);
      border-color: #f9c4b8;
    }

    [data-tema="claro"] .tv-tag.info {
      background: #eff6ff;
      color: #1e40af;
      border-color: #bfdbfe;
    }

    [data-tema="claro"] .tv-tag.aviso {
      background: #fff8e1;
      color: #b45309;
      border-color: #f0d080;
    }

    .tv-titulo {
      font-size: clamp(28px, 3.5vw, 48px);
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 20px;
      max-width: 820px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tv-slide.has-media .tv-titulo {
      font-size: 40px;
      max-width: 100%;
    }

    .tv-corpo {
      font-size: clamp(14px, 1.4vw, 20px);
      line-height: 1.7;
      color: var(--text-muted);
      max-width: 820px;
      overflow-y: auto;
      flex: 1;
      scrollbar-width: none;
    }

    .tv-corpo::-webkit-scrollbar {
      display: none;
    }

    .tv-slide.has-media .tv-corpo {
      font-size: 20px;
      -webkit-line-clamp: 6;
    }

    .tv-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 32px;
      opacity: .7;
    }

    /* Barra de progresso para trocar de slide (contador de 9seg)
      .tv-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      background: var(--orange);
      width: 0%;
      transition: width linear;
      z-index: 20;
    } */

    /* ── RODAPÉ ── */
    .tv-footer {
      height: 64px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      flex-shrink: 0;
    }

    .tv-dots {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tv-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: background .3s, transform .3s;
    }

    .tv-dot.active {
      background: var(--orange);
      transform: scale(1.4);
    }

    .tv-footer-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .tv-counter {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* ── TOGGLE TEMA (canto) ── */
    .tv-footer-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: background .2s, color .2s;
    }

    .tv-footer-btn:hover {
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }

    /* ── VAZIO ── */
    .tv-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--text-muted);
    }

    .tv-empty-icon {
      font-size: 80px;
      opacity: .2;
    }

    .tv-empty p {
      font-size: 24px;
      font-weight: 600;
    }

    /* ── ANIMAÇÕES ── */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tv-slide-content>* {
      animation: slideIn .5s ease both;
    }

    .tv-slide-content>*:nth-child(1) {
      animation-delay: .1s;
    }

    .tv-slide-content>*:nth-child(2) {
      animation-delay: .2s;
    }

    .tv-slide-content>*:nth-child(3) {
      animation-delay: .3s;
    }

    .tv-slide-content>*:nth-child(4) {
      animation-delay: .4s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* ── TELA CHEIA AUTOMÁTICA ── */
    .tv-fullscreen-hint {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, .6);
      color: #fff;
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 8px;
      z-index: 200;
      opacity: 1;
      transition: opacity .5s;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="tv-shell">

  <!-- TOPBAR -->
    <header class="tv-topbar">
      <div class="tv-logo">
        <img src="img/logo-sidebar.png" draggable="false" oncontextmenu="return false" style="width:200px;height:200px;object-fit:contain">

      </div>

      <div class="tv-topbar-center">
        <i data-lucide="megaphone" style="width:18px;height:18px"></i>
        Avisos &amp; Comunicados Internos
      </div>

      <div class="tv-clock">
        <div class="tv-clock-time" id="tv-hora">--:--</div>
        <div class="tv-clock-date" id="tv-data">--</div>
      </div>
    </header>

    <!-- STAGE -->
    <div class="tv-stage" id="tv-stage">
      <div class="tv-slides" id="tv-slides"></div>
      <div class="tv-progress" id="tv-progress"></div>
      <button onclick="event.stopPropagation();clearInterval(timer);goTo(idx-1);iniciarAutoplay()"
        style="position:absolute;left:24px;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;transition:background .2s">
        <i data-lucide="chevron-left" style="width:24px;height:24px"></i>
      </button>
      <button onclick="event.stopPropagation();clearInterval(timer);goTo(idx+1);iniciarAutoplay()"
        style="position:absolute;right:24px;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;transition:background .2s">
        <i data-lucide="chevron-right" style="width:24px;height:24px"></i>
      </button>
    </div>

    <!-- RODAPÉ -->
    <footer class="tv-footer">
      <div class="tv-dots" id="tv-dots"></div>
      <div class="tv-footer-right">
        <span class="tv-counter" id="tv-counter"></span>
        <button class="tv-footer-btn" id="tv-fullscreen-btn" title="Tela cheia" onclick="toggleTelaCheia()">
          <i data-lucide="maximize" id="tv-fullscreen-icon" style="width:18px;height:18px"></i>
        </button>
        <button class="tv-footer-btn" id="tv-theme-btn" title="Alternar tema" onclick="toggleTema()">
          <i data-lucide="moon" id="tv-theme-icon" style="width:18px;height:18px"></i>
        </button>
      </div>
    </footer>

  </div>

  <!-- Botão tema (discreto) -->
  <button class="tv-theme-btn" id="tv-fullscreen-btn" title="Tela cheia" onclick="toggleTelaCheia()"
    style="bottom: 132px">
    <i data-lucide="maximize" id="tv-fullscreen-icon" style="width:18px;height:18px"></i>
  </button>
  <button class="tv-theme-btn" id="tv-theme-btn" title="Alternar tema" onclick="toggleTema()">
    <i data-lucide="moon" id="tv-theme-icon" style="width:18px;height:18px"></i>
  </button>


  <script>
    /* ═══════════════════════════════════════
       CONFIGURAÇÕES
    ═══════════════════════════════════════ */
    const SLIDE_DURATION = 25000;   // ms por slide
    const REFRESH_INTERVAL = 60000; // recarrega comunicados a cada 60s

    /* ═══════════════════════════════════════
       RELÓGIO
    ═══════════════════════════════════════ */
    const DIAS = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
    const MESES = ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];

    function atualizarRelogio() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('tv-hora').textContent = h + ':' + m;
      document.getElementById('tv-data').textContent =
        DIAS[now.getDay()] + ', ' + now.getDate() + ' de ' + MESES[now.getMonth()] + ' de ' + now.getFullYear();
    }
    atualizarRelogio();
    setInterval(atualizarRelogio, 1000);

    /* ═══════════════════════════════════════
       TEMA
    ═══════════════════════════════════════ */
    const TEMA_KEY = 'aesa_tv_tema';

    function aplicarTema(tema) {
      document.documentElement.setAttribute('data-tema', tema);
      const icon = document.getElementById('tv-theme-icon');
      if (icon) {
        icon.setAttribute('data-lucide', tema === 'escuro' ? 'sun' : 'moon');
        lucide.createIcons({ nodes: [icon] });
      }
      localStorage.setItem(TEMA_KEY, tema);
    }

    function toggleTema() {
      const atual = document.documentElement.getAttribute('data-tema');
      aplicarTema(atual === 'escuro' ? 'claro' : 'escuro');
    }

    // Carrega tema salvo
    const temaSalvo = localStorage.getItem(TEMA_KEY) || 'escuro';
    aplicarTema(temaSalvo);

    /* ═══════════════════════════════════════
       TELA CHEIA
    ═══════════════════════════════════════ */
    function toggleTelaCheia() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
        document.getElementById('tv-fullscreen-icon').setAttribute('data-lucide', 'minimize');
      } else {
        document.exitFullscreen && document.exitFullscreen();
        document.getElementById('tv-fullscreen-icon').setAttribute('data-lucide', 'maximize');
      }
      lucide.createIcons({ nodes: [document.getElementById('tv-fullscreen-icon')] });
    }

    // Atualiza ícone ao sair de tela cheia pelo ESC
    document.addEventListener('fullscreenchange', () => {
      const icon = document.getElementById('tv-fullscreen-icon');
      if (icon) {
        icon.setAttribute('data-lucide', document.fullscreenElement ? 'minimize' : 'maximize');
        lucide.createIcons({ nodes: [icon] });
      }
    });

    /* ═══════════════════════════════════════
       DADOS — lê do servidor
    ═══════════════════════════════════════ */
    async function getComunicadosRemoto() {
      try {
        const r = await fetch('https://intranet.aesaempilhadeiras.com.br/db', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ metodo: 'GET', tabela: 'comunicados', params: '?select=*&order=ordem.asc,criado.asc' })
        });
        if (!r.ok) return [];
        const data = await r.json();
        return Array.isArray(data) ? data : [];
      } catch { return []; }
    }

    function tempoRelativo(ts) {
      const d = Date.now() - ts;
      if (d < 60000) return 'Agora';
      if (d < 3600000) return 'Há ' + Math.floor(d / 60000) + ' min';
      if (d < 86400000) return 'Há ' + Math.floor(d / 3600000) + 'h';
      if (d < 172800000) return 'Há 1 dia';
      return 'Há ' + Math.floor(d / 86400000) + ' dias';
    }

    const TIPO_LABEL = { novo: 'Novo', info: 'Informativo', aviso: 'Aviso' };
    const TIPO_ICON = { novo: 'star', info: 'info', aviso: 'triangle-alert' };

    /* ═══════════════════════════════════════
       CARROSSEL
    ═══════════════════════════════════════ */
    let idx = 0;
    let timer = null;
    let progressTimer = null;
    let lista = [];

    async function renderSlides() {
      lista = await getComunicadosRemoto();
      const stage = document.getElementById('tv-slides');
      const dotsEl = document.getElementById('tv-dots');
      const counter = document.getElementById('tv-counter');

      document.querySelector('.tv-stage').addEventListener('click', () => {
        clearInterval(timer);
        goTo(idx + 1);
        iniciarAutoplay();
      });

      if (!lista.length) {
        stage.innerHTML = `
        <div class="tv-empty" style="min-width:100%;width:100%">
          <div class="tv-empty-icon">📭</div>
          <p>Nenhum comunicado no momento.</p>
        </div>`;
        dotsEl.innerHTML = '';
        counter.textContent = '';
        clearInterval(timer);
        clearInterval(progressTimer);
        return;
      }

      stage.innerHTML = lista.map((c, i) => {
        const hasMedia = !!(c.imagem || c.video);
        const soMidia = hasMedia && (!c.texto || c.texto.trim() === '');
        const mediaHtml = hasMedia ? buildMedia(c) : '';
        const tipo = c.tipo || 'info';

        return `

        <div class="tv-slide${c.destaque ? ' destaque' : ''}${hasMedia && !soMidia ? ' has-media' : ''}${soMidia ? ' so-midia' : ''}" id="tv-slide-${i}">
          ${soMidia ? '' : `
            <div class="tv-slide-content">
              <div class="tv-tag ${tipo}">
                <i data-lucide="${TIPO_ICON[tipo] || 'megaphone'}" style="width:14px;height:14px"></i>
                ${TIPO_LABEL[tipo] || tipo}
              </div>
              <div class="tv-titulo">${escapeHtml(c.titulo)}</div>
              <div class="tv-corpo">${escapeHtml(c.texto)}</div>
              <div class="tv-meta">
                <i data-lucide="clock" style="width:14px;height:14px"></i>
                ${tempoRelativo(c.criado)}
              </div>
            </div>
          `}
          ${mediaHtml}
        </div>`;
      }).join('');

      dotsEl.innerHTML = lista.map((_, i) =>
        `<div class="tv-dot${i === 0 ? ' active' : ''}" id="tv-dot-${i}"></div>`
      ).join('');

      counter.textContent = lista.length > 1 ? `1 / ${lista.length}` : '';

      if (typeof lucide !== 'undefined') lucide.createIcons();

      idx = 0;
      goTo(0);
      iniciarAutoplay();
    }

      function buildMedia(c) {
        const soMidia = !c.texto || c.texto.trim() === '';
        if (c.video) {
          return `<div class="tv-slide-media" style="${soMidia ? 'position:absolute;inset:0;width:100%;height:100%' : ''}">
          <video autoplay muted loop playsinline src="${c.video}" style="${soMidia ? 'width:100%;height:100%;object-fit:fill' : ''}"></video>
        </div>`;
        }
        if (c.imagem) {
          return `<div class="tv-slide-media" style="${soMidia ? 'position:absolute;inset:0;width:100%;height:100%' : ''}">
          <img src="${c.imagem}" alt="${escapeHtml(c.titulo)}" loading="lazy" style="${soMidia ? 'width:100%;height:100%;object-fit:cover;display:block' : ''}">
        </div>`;
        }
        return '';
      }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function goTo(i) {
      if (!lista.length) return;
      idx = ((i % lista.length) + lista.length) % lista.length;

      // Move slides
      document.getElementById('tv-slides').style.transform = `translateX(-${idx * 100}%)`;

      // Dots
      lista.forEach((_, j) => {
        const d = document.getElementById('tv-dot-' + j);
        if (d) d.classList.toggle('active', j === idx);
      });

      // Counter
      const counter = document.getElementById('tv-counter');
      if (counter && lista.length > 1) counter.textContent = `${idx + 1} / ${lista.length}`;

      // Re-anima conteúdo
      const slideEl = document.getElementById('tv-slide-' + idx);
      if (slideEl) {
        const content = slideEl.querySelector('.tv-slide-content');
        if (content) {
          content.querySelectorAll('*').forEach(el => {
            el.style.animation = 'none';
            el.offsetHeight; // reflow
            el.style.animation = '';
          });
        }
      }

      iniciarProgressBar();
    }

    function iniciarProgressBar() {
      const bar = document.getElementById('tv-progress');
      if (!bar) return;
      clearInterval(progressTimer);
      bar.style.transition = 'none';
      bar.style.width = '0%';
      bar.offsetHeight; // reflow
      bar.style.transition = `width ${SLIDE_DURATION}ms linear`;
      bar.style.width = '100%';
    }

    function iniciarAutoplay() {
      clearInterval(timer);
      if (lista.length <= 1) return;
      timer = setInterval(() => goTo(idx + 1), SLIDE_DURATION);
    }

    /* ═══════════════════════════════════════
       AUTO-REFRESH (pega novos comunicados)
    ═══════════════════════════════════════ */
    setInterval(async () => {
      const novaLista = await getComunicados();
      const mudou = JSON.stringify(novaLista) !== JSON.stringify(lista);
      if (mudou) renderSlides();
    }, REFRESH_INTERVAL);

    /* ═══════════════════════════════════════
       NAVEGAÇÃO POR TECLADO (controle remoto)
    ═══════════════════════════════════════ */
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        clearInterval(timer);
        goTo(idx + 1);
        iniciarAutoplay();
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        clearInterval(timer);
        goTo(idx - 1);
        iniciarAutoplay();
      }
      if (e.key === 'f' || e.key === 'F') entrarTelaCheia();
      if (e.key === 't' || e.key === 'T') toggleTema();
    });

    /* ═══════════════════════════════════════
       INIT
    ═══════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
      renderSlides();
    });
  </script>
</body>

</html>
